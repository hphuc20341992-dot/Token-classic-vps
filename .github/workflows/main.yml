name: Windows-Auto-Rerun
on: 
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 15 # Giảm timeout vì phiên chạy rất ngắn

    steps:
      - name: 1. Setup Tools
        shell: powershell
        run: |
          # Cài đặt nhanh Tailscale
          choco install tailscale -y --no-progress
          Start-Service tailscale -ErrorAction SilentlyContinue

      - name: 2. Connect Tailscale
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $TS_EXE = "C:\Program Files\Tailscale\tailscale.exe"
          # Kết nối và đặt tên máy để dễ quản lý
          & $TS_EXE up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=GitHub-VM --accept-routes --reset

      - name: 3. Setup RDP
        shell: powershell
        run: |
          # Thiết lập User và mở cổng Remote Desktop
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Wait 5 Minutes and Auto-Trigger
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $waitMinutes = 5
          Write-Host "VM se chay trong $waitMinutes phut truoc khi tu dong reset..."
          
          # Vòng lặp in log mỗi phút để tránh bị treo
          for ($i=1; $i -le $waitMinutes; $i++) {
              Start-Sleep -Seconds 60
              Write-Host "Uptime: $i phut. Dang hoat dong..."
          }

          # Kích hoạt máy ảo mới trước khi tắt máy cũ
          Write-Host "Dang kich hoat phien moi qua GitHub CLI..."
          gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY"
          
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Kich hoat thanh cong! Phien moi dang bat dau."
          } else {
              Write-Host "Loi! Kiem tra lai quyen Read/Write trong Settings hoac GH_PAT."
          }

      - name: 5. Buffer
        shell: powershell
        run: |
          # Chờ 1 phút cuối để đảm bảo máy mới đã lên rồi mới đóng máy cũ
          Write-Host "Cho 60 giay de ban giao..."
          Start-Sleep -Seconds 60
