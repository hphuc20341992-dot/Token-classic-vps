name: System-Auto-Update
on: 
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: 1. Environmental Check
        shell: powershell
        run: |
          choco install tailscale -y --no-progress
          Start-Service tailscale -ErrorAction SilentlyContinue

      - name: 2. Network Sync (GIỮ IP CỐ ĐỊNH)
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $TS_EXE = "C:\Program Files\Tailscale\tailscale.exe"
          # SỬA TẠI ĐÂY: Đặt hostname cố định để Tailscale cấp lại IP cũ
          & $TS_EXE up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=GitHub-VPS-Co-Dinh --accept-routes --reset

      - name: 3. Remote Access
        shell: powershell
        run: |
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Execution & Clean-up Loop
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $waitMinutes = 5
          for ($i=1; $i -le $waitMinutes; $i++) {
              Start-Sleep -Seconds 60
              Write-Host "Uptime: $i/5 min. IP is being maintained."
          }

          # KÍCH HOẠT MÁY MỚI (Nối tiếp)
          gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY"

          # XÓA LOG CŨ
          $runs = gh run list --workflow "$env:GITHUB_WORKFLOW" --limit 5 --json databaseId -q '.[].databaseId'
          foreach ($runId in $runs) {
              if ($runId -ne $env:GITHUB_RUN_ID) {
                  gh run delete $runId --repo "$env:GITHUB_REPOSITORY"
              }
          }

      - name: 5. Finalizing
        shell: powershell
        run: Start-Sleep -Seconds 60
